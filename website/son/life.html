<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>照片墙</title>
  <link rel="stylesheet" href="../../css/son/life.css">
</head>
<body>

  <h3 class="page-title">我的照片墙</h3>
  <hr />

  <div class="photo-wall">

    <!-- 第一排：从左到右（S形起笔） -->
    <div class="photo-card" style="top: 30px; left: 4%; transform: rotate(-5deg);">
      <img src="../../images/小提琴.jpg" alt="照片1">
    </div>

    <div class="photo-card" style="top: 60px; left: 22%; transform: rotate(3deg);">
      <img src="../../images/甜品.jpg" alt="照片2">
    </div>

    <div class="photo-card" style="top: 20px; left: 40%; transform: rotate(-4deg);">
      <img src="../../images/腊梅.jpg" alt="照片3">
    </div>

    <div class="photo-card" style="top: 70px; left: 58%; transform: rotate(6deg);">
      <img src="../../images/东方之门.jpg" alt="照片4">
    </div>

    <div class="photo-card" style="top: 30px; left: 76%; transform: rotate(-3deg);">
      <img src="../../images/拙政园1.jpg" alt="照片5">
    </div>

    <!-- 第二排：从右到左（S形折回） -->
    <div class="photo-card" style="top: 300px; left: 76%; transform: rotate(5deg);">
      <img src="../../images/桥.jpg" alt="照片6">
    </div>

    <div class="photo-card" style="top: 330px; left: 58%; transform: rotate(-4deg);">
      <img src="../../images/上海 (2).jpg" alt="照片7">
    </div>

    <div class="photo-card" style="top: 280px; left: 40%; transform: rotate(3deg);">
      <img src="../../images/湖心亭.jpg" alt="照片8">
    </div>

    <div class="photo-card" style="top: 340px; left: 22%; transform: rotate(-6deg);">
      <img src="../../images/塔.jpg" alt="照片9">
    </div>

    <div class="photo-card" style="top: 300px; left: 4%; transform: rotate(4deg);">
      <img src="../../images/西园操场彩霞.jpg" alt="照片10">
    </div>

  </div>

</body>
</html>
